server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version from Server response header
    server_tokens off;

    # Allow raw video uploads up to 2 GB (backend transcodes to H.264/MP4)
    client_max_body_size 2048m;
    client_body_timeout  300s;

    # SPA fallback — all non-file routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the FastAPI backend
    location /api/ {
        proxy_pass              http://api:8000;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        # Extended timeouts: large video uploads + ffmpeg transcoding can take many minutes
        proxy_read_timeout      900s;
        proxy_connect_timeout   10s;
        proxy_send_timeout      900s;
        # Stream request body to backend without nginx buffering the full file
        proxy_request_buffering off;
    }

    # Security headers
    add_header X-Content-Type-Options  "nosniff"    always;
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: blob:;
        media-src 'self' blob:;
        font-src 'self';
        connect-src 'self';
        frame-ancestors 'none';
        form-action 'self';
        base-uri 'self';
    " always;
    # Restrict browser feature APIs (file-picker uploads don't need camera/mic APIs)
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
    # Cross-origin isolation — prevent cross-origin window access attacks
    add_header Cross-Origin-Opener-Policy   "same-origin" always;
    # Require all sub-resources to opt in to cross-origin sharing (safe: everything is same-origin)
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    # Prevent this site's assets from being embedded by other origins
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Static asset caching — Vite hashes filenames so safe to cache long-term
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml application/xml+rss text/javascript
        image/svg+xml;
}
